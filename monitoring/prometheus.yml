# Prometheus 配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'royalbot-portal'
    environment: 'production'

# 告警规则
rule_files:
  - '/etc/prometheus/alerts/*.yml'

# 抓取配置
scrape_configs:
  # 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # RoyalBot 后端 API
  - job_name: 'royalbot-backend'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend-api'
    metrics_path: '/metrics'

  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
        labels:
          service: 'redis'

  # PostgreSQL 监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          service: 'postgres'

  # Node Exporter (系统监控，可选)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          service: 'system'

# AlertManager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
