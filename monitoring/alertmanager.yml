# AlertManager 配置
global:
  resolve_timeout: 5m
  # 默认接收器配置
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@royalbot.com'
  smtp_auth_username: 'alertmanager@royalbot.com'
  smtp_auth_password: 'password'

# 路由配置
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'

# 接收器配置
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://backend:8000/api/alerts/webhook'

  - name: 'critical'
    webhook_configs:
      - url: 'http://backend:8000/api/alerts/webhook'
    email_configs:
      - to: 'admin@royalbot.com'
        headers:
          Subject: '[CRITICAL] RoyalBot Alert'

  - name: 'warning'
    webhook_configs:
      - url: 'http://backend:8000/api/alerts/webhook'

# 抑制规则
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
