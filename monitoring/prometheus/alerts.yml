# Prometheus 告警规则
groups:
  - name: royalbot_alerts
    interval: 30s
    rules:
      # API 服务可用性
      - alert: APIServiceDown
        expr: up{job="royalbot-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend-api
        annotations:
          summary: "API 服务宕机"
          description: "RoyalBot API 服务已宕机超过1分钟"

      # HTTP 错误率过高
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend-api
        annotations:
          summary: "API 错误率过高"
          description: "API 错误率超过 5% (当前值: {{ $value | humanizePercentage }})"

      # API 响应时间过长
      - alert: SlowAPIResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: backend-api
        annotations:
          summary: "API 响应缓慢"
          description: "P95 响应时间超过 1秒 (当前值: {{ $value }}s)"

      # Redis 连接失败
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis 服务宕机"
          description: "Redis 缓存服务已宕机"

      # Redis 内存使用率过高
      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis 内存使用率过高"
          description: "Redis 内存使用率超过 90%"

      # PostgreSQL 连接失败
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL 服务宕机"
          description: "PostgreSQL 数据库服务已宕机"

      # 数据库连接数过高
      - alert: PostgresHighConnections
        expr: pg_stat_database_numbackends{datname="royalbot"} / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "数据库连接数过高"
          description: "数据库连接数超过 80%"

      # 磁盘空间不足
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "磁盘空间不足"
          description: "根分区剩余空间低于 10%"

  - name: business_alerts
    interval: 1m
    rules:
      # VIP 用户数异常下降
      - alert: VIPUsersDropping
        expr: delta(vip_users_total[1h]) < -10
        labels:
          severity: warning
        annotations:
          summary: "VIP 用户数异常下降"
          description: "过去1小时 VIP 用户数减少超过 10 人"

      # Emby 服务器离线
      - alert: EmbyServerOffline
        expr: emby_server_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Emby 服务器离线"
          description: "Emby 服务器 {{ $labels.server_name }} 已离线"

      # 待处理工单过多
      - alert: HighPendingTickets
        expr: tickets_total{status="open"} > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "待处理工单过多"
          description: "当前有 {{ $value }} 个待处理工单"
