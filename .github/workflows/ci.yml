name: RoyalBot Portal CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'user_backend/**'
      - 'admin_backend/**'
      - 'user_frontend/**'
      - 'admin_frontend/**'
      - 'telegram_login_bot/**'
      - 'nginx/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - 'deploy.sh'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: royalbot-portal

jobs:
  # ==================== Lint & Security Scan ====================
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff mypy pytest pytest-cov bandit
          pip install -r admin_backend/requirements.txt

      - name: Run Ruff linter
        run: |
          ruff check admin_backend/

      - name: Run security check with Bandit
        run: |
          bandit -r admin_backend/ -f json -o bandit-report.json || true
          bandit -r admin_backend/ -f txt
        continue-on-error: true

      - name: Run type checking
        run: |
          mypy admin_backend/ --ignore-missing-imports
        continue-on-error: true

  # ==================== Security Scanning ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run safety check on Python dependencies
        run: |
          pip install safety
          safety check --file admin_backend/requirements.txt --json > safety-report.json || true
          safety check --file admin_backend/requirements.txt || true
        continue-on-error: true

  # ==================== Build & Push Images ====================
  build-and-push:
    name: Build & Push Docker Images
    needs: [lint-backend, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [admin_backend, admin_frontend, telegram_login_bot]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=RoyalBot Portal ${{ matrix.service }}
            org.opencontainers.image.vendor=RoyalBot

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ==================== Deploy ====================
  deploy:
    name: Deploy to Production
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://login.laodaemby.xyz

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /root/RoyalBot-Portal

            # 拉取最新代码
            echo "=== Pulling latest code ==="
            git pull origin main

            # 构建镜像
            echo "=== Building Docker images ==="
            docker compose build admin_backend admin_frontend

            # 重启服务
            echo "=== Restarting services ==="
            docker compose up -d --remove-orphans admin_backend admin_frontend

            # 清理旧镜像
            echo "=== Cleaning up old images ==="
            docker image prune -af --filter "until=24h"

            # 显示服务状态
            echo "=== Service status ==="
            docker compose ps

      - name: Health check
        run: |
          sleep 30
          for i in {1..10}; do
            echo "Health check attempt $i..."
            if curl -f https://login.laodaemby.xyz/health; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Notify deployment status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: |
            Deployment ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Changes: ${{ github.event.head_commit.message }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # ==================== Rollback (manual) ====================
  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Rollback on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /root/RoyalBot-Portal

            # 回滚到上一个 git commit
            echo "=== Rolling back to previous commit ==="
            git reset --hard HEAD~1

            # 重新构建并重启
            docker compose build admin_backend admin_frontend
            docker compose up -d --remove-orphans

            echo "=== Rollback completed ==="
            docker compose ps
