services:
  admin_frontend:
    build:
      context: ./admin_frontend
      dockerfile: Dockerfile
    image: royalbot-portal-admin_frontend:latest
    container_name: royalbot_admin_frontend
    restart: unless-stopped
    networks:
      - royalbot-portal_royalbot_network
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  admin_backend:
    build:
      context: ./admin_backend
      dockerfile: Dockerfile
    image: royalbot-portal-admin_backend:latest
    container_name: royalbot_admin_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - royalbot-portal_royalbot_network
    environment:
      - TZ=Asia/Shanghai
      - USER_BACKEND_DB_PATH=/shared/user_backend/user_backend/royalbot.db
    volumes:
      - royalbot_user_data:/shared/user_backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  user_frontend:
    build:
      context: ./user_frontend
      dockerfile: Dockerfile
    image: royalbot-portal-user_frontend:latest
    container_name: royalbot_user_frontend
    restart: unless-stopped
    networks:
      - royalbot-portal_royalbot_network
    environment:
      - TZ=Asia/Shanghai

networks:
  royalbot-portal_royalbot_network:
    external: true

volumes:
  royalbot_user_data:
    external: true
