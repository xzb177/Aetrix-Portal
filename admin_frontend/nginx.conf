server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # API 代理到后端（使用变量延迟 DNS 解析）
    # 设置 DNS 解析器（使用 Docker 内置 DNS）
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # 后端地址变量
    set $backend_host "admin_backend";

    location /api/ {
        # 使用变量实现动态 DNS 解析
        proxy_pass http://$backend_host:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CORS 头（如果需要）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ============= SPA 静态资源缓存策略 =============
    # 带哈希的 JS/CSS 资源可以长期缓存（Vite 生成带 contentHash 的文件名）
    location /admin/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # vite.svg 等根目录资源
    location /admin/vite.svg {
        alias /usr/share/nginx/html/vite.svg;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ============= SPA 路由支持 =============
    # index.html 必须永不缓存（每次部署后获取最新版本）
    location = /admin/index.html {
        alias /usr/share/nginx/html/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # 其他 /admin/* 路由（SPA 深层链接，返回 index.html 由前端路由处理）
    location /admin/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ @admin_fallback;
    }

    # SPA fallback - 当资源不存在时返回 index.html
    location @admin_fallback {
        rewrite ^/admin/(.*)$ /$1 break;
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
