# http 块级别的 map 指令需要在主配置文件中
# 这里使用简化方案，不使用条件编码头

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 安全头部
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ==================== Gzip 压缩 ====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ==================== 静态资源缓存策略 ====================
    # HTML 文件 - 禁用缓存
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires 0;
    }

    # JS 文件 - 长期缓存
    location ~* \.js$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary Accept-Encoding always;
        access_log off;
        # 不添加 Content-Encoding 头，让浏览器自然处理
    }

    # CSS 文件 - 长期缓存
    location ~* \.css$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary Accept-Encoding always;
        access_log off;
    }

    # 字体文件 - 长期缓存
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # 图片文件 - 长期缓存
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # JSON/XML 文件
    location ~* \.(json|xml)$ {
        expires 7d;
        add_header Cache-Control "public" always;
    }

    # ==================== SPA 路由支持 ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==================== 安全限制 ====================
    server_tokens off;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
}
